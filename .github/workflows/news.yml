name: AI News Check

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日日本時間7時（UTC 22時）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run news script
        run: python news.py

      - name: Save result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add result.txt
          git diff --cached --quiet || git commit -m "Update news data"
          git push
