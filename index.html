<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI・ビッグテック チェック</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', sans-serif; background: #0d1117; color: #e0e0e0; padding: 20px; }
h1 { color: #58a6ff; font-size: 22px; margin-bottom: 4px; }
.subtitle { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-name { font-size: 17px; font-weight: bold; color: #58a6ff; }
.btn-chart { padding: 5px 10px; background: #1f6feb; color: #fff; text-decoration: none; border-radius: 6px; font-size: 12px; }
.btn-chart:hover { background: #388bfd; }
.price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
.price { font-size: 22px; font-weight: bold; color: #fff; }
.change-up { font-size: 15px; color: #3fb950; font-weight: bold; }
.change-down { font-size: 15px; color: #f85149; font-weight: bold; }
.meta-row { font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.meta-row span { color: #e0e0e0; }
.points { font-size: 13px; background: #1c2128; border-left: 3px solid #58a6ff; padding: 8px 10px; border-radius: 4px; margin-bottom: 12px; color: #c9d1d9; }
.news-title { font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.news-item { font-size: 13px; color: #c9d1d9; padding: 6px 0; border-bottom: 1px solid #21262d; line-height: 1.5; }
.news-item:last-child { border-bottom: none; }
.news-date { color: #8b949e; font-size: 11px; margin-bottom: 2px; }
.loading { color: #8b949e; text-align: center; padding: 40px; }
</style>
</head>
<body>
<h1>🤖 AI・ビッグテック チェック</h1>
<div class="subtitle" id="date">読み込み中...</div>
<div class="grid" id="grid"><div class="loading">データを読み込んでいます...</div></div>

<script>
fetch('result.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('date').textContent = `更新日: ${data.date}　毎朝7時に自動更新`;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    data.stocks.forEach(s => {
      const changeClass = s.positive ? 'change-up' : 'change-down';
      const newsHtml = s.news.map(n => `
        <div class="news-item">
          <div class="news-date">${n.date}</div>
          <div>${n.title}</div>
        </div>`).join('');
      grid.innerHTML += `
        <div class="card">
          <div class="card-header">
            <div class="card-name">📊 ${s.name}</div>
            <a class="btn-chart" href="${s.chart_url}" target="_blank">日足チャート</a>
          </div>
          <div class="price-row">
            <div class="price">${s.price}</div>
            <div class="${changeClass}">${s.change_icon} ${s.change}</div>
          </div>
          <div class="meta-row">次回決算: <span>${s.earnings}</span></div>
          <div class="points">🔍 ${s.points}</div>
          <div class="news-title">📰 最新ニュース</div>
          ${newsHtml}
        </div>`;
    });
  })
  .catch(() => {
    document.getElementById('grid').innerHTML = '<div class="loading">データがまだありません</div>';
  });
</script>
</body>
</html>
