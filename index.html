<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI・ビッグテック チェック</title>
<style>
body { font-family: 'Helvetica Neue', sans-serif; padding: 20px; background: #0d1117; color: #e0e0e0; }
h1 { color: #58a6ff; font-size: 24px; margin-bottom: 4px; }
.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; }
.card-name { font-size: 16px; font-weight: bold; color: #58a6ff; margin-bottom: 8px; }
.btn-chart { display: inline-block; padding: 6px 12px; background: #1f6feb; color: #fff; text-decoration: none; border-radius: 6px; font-size: 12px; }
.btn-chart:hover { background: #388bfd; }
.section-title { color: #58a6ff; font-size: 18px; margin: 32px 0 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
pre { background: #161b22; border: 1px solid #30363d; padding: 24px; border-radius: 12px; white-space: pre-wrap; font-size: 15px; line-height: 2; font-family: monospace; }
</style>
</head>
<body>
<h1>🤖 AI・ビッグテック チェック</h1>
<div class="subtitle">毎朝7時に自動更新</div>

<div class="grid">
  <div class="card">
    <div class="card-name">📊 Google (Alphabet)</div>
    <a class="btn-chart" href="https://jp.tradingview.com/chart/?symbol=NASDAQ:GOOGL&interval=D" target="_blank">日足チャート</a>
  </div>
  <div class="card">
    <div class="card-name">📊 Meta</div>
    <a class="btn-chart" href="https://jp.tradingview.com/chart/?symbol=NASDAQ:META&interval=D" target="_blank">日足チャート</a>
  </div>
  <div class="card">
    <div class="card-name">📊 Amazon</div>
    <a class="btn-chart" href="https://jp.tradingview.com/chart/?symbol=NASDAQ:AMZN&interval=D" target="_blank">日足チャート</a>
  </div>
  <div class="card">
    <div class="card-name">📊 Apple</div>
    <a class="btn-chart" href="https://jp.tradingview.com/chart/?symbol=NASDAQ:AAPL&interval=D" target="_blank">日足チャート</a>
  </div>
  <div class="card">
    <div class="card-name">📊 NVIDIA</div>
    <a class="btn-chart" href="https://jp.tradingview.com/chart/?symbol=NASDAQ:NVDA&interval=D" target="_blank">日足チャート</a>
  </div>
  <div class="card">
    <div class="card-name">📊 Microsoft</div>
    <a class="btn-chart" href="https://jp.tradingview.com/chart/?symbol=NASDAQ:MSFT&interval=D" target="_blank">日足チャート</a>
  </div>
</div>

<div class="section-title">📋 本日のデータ</div>
<pre id="result">読み込み中...</pre>
<script>
fetch('result.txt?t=' + Date.now())
  .then(r => r.text())
  .then(t => document.getElementById('result').textContent = t)
  .catch(() => document.getElementById('result').textContent = 'データがまだありません');
</script>
</body>
</html>
